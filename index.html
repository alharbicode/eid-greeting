<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>هدية العيد</title>

  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

<section class="portal">

  <div class="creator">
    م. سليمان الحربي · alharbi code
  </div>

  <div class="moon"></div>

  <div class="stars"></div>

  <div class="sheep" title="عيد أضحى مبارك">
    <div class="sheep-body"></div>
    <div class="sheep-head"></div>
    <div class="sheep-ear"></div>
    <div class="sheep-face">•ᴥ•</div>

    <div class="sheep-leg leg1"></div>
    <div class="sheep-leg leg2"></div>
    <div class="sheep-leg leg3"></div>
    <div class="sheep-leg leg4"></div>
  </div>

  <div class="gift" id="gift">
    <div class="lid"></div>

    <div class="body"></div>

    <div class="ribbon-v"></div>
    <div class="ribbon-h"></div>
  </div>

  <div id="intro">

    <span class="badge">
      بوابة هدية العيد
    </span>

    <h1>افتح هديتك الرقمية</h1>

    <p>
      تهنئة فاخرة بعيد الأضحى المبارك للأهل والأصدقاء
    </p>

    <div class="form">

      <input
        id="nameInput"
        type="text"
        placeholder="اكتب اسمك هنا"
      >

      <button id="openBtn">
        افتح الهدية ✨
      </button>

    </div>

  </div>

  <div class="card" id="card">

    <span class="badge">
      تم فتح الهدية بنجاح ✨
    </span>

    <h2>عيد أضحى مبارك</h2>

    <h3 id="personName"></h3>

    <p>
      تقبل الله منا ومنكم صالح الأعمال
      <br>
      وجعل أيامكم فرحًا وسعادة وطمأنينة
      <br>
      وكل عام وأنتم بخير
    </p>

    <button id="shareBtn">
      مشاركة الهدية
    </button>

    <small>
      م. سليمان الحربي · alharbi code
    </small>

  </div>

</section>

<script src="./js/main.js"></script>

</body>
</html>
